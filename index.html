    </style>
</head>

    <h1 style="text-align: center;">Noxa</h1>
    <div class="grid">
        <div class="card">
            <div style="background:#333; height:150px; border-radius:5px; margin-bottom:10px;"></div>
            <h4>المنتاليست</h4>
            <a href="watch.html" class="btn-watch">مشاهدة</a>
        </div>
    </div>

</html>
