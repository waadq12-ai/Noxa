<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Noxa</title>
    <style>
    body { background-color: #0c0c0c !important; color: white !important; margin: 0; font-family: sans-serif; overflow-x: hidden; }

    /* القائمة الجانبية: جعلناها تغطي مساحة أكبر وخطوطها ضخمة */
    .sidebar { 
        display: none; position: fixed; top: 0; right: 0; width: 400px; height: 100%; 
        background: rgba(10, 10, 10, 0.95); padding: 60px; z-index: 1000; border-left: 3px solid #3498db;
    }
    .menu-item { padding: 30px 0; font-size: 26px; color: #fff; cursor: pointer; text-decoration: none; display: block; }

    /* الشبكة: جعلنا البطاقات عملاقة */
    .grid-container { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
        gap: 50px; 
        padding: 50px; 
    }
    .card { 
        background: #111; border-radius: 20px; padding: 20px; text-align: center; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .card img { width: 100%; height: 450px; object-fit: cover; border-radius: 15px; }
    
    /* زر المشاهدة أصبح ضخماً في أسفل البطاقة */
    .btn-watch { 
        background: #3498db; color: white; padding: 15px; width: 100%; 
        border: none; border-radius: 10px; font-size: 18px; margin-top: 15px; cursor: pointer;
    }
</style>


</head>
<body>

    <div class="menu-btn" onclick="toggleSidebar()">☰ Noxa</div>

  <div class="sidebar" id="mySidebar">
    <div class="menu-item" onclick="toggleSidebar()" style="text-align: left; padding: 10px;">✕</div>
    <h2>Noxa</h2>
    <a href="index.html" class="menu-item">🏠 الرئيسية</a>
    <a href="#" class="menu-item">🎬 المسلسلات والأفلام</a>
    <a href="#" class="menu-item">📖 المانجا والمانهوا</a>
    <a href="#" class="menu-item">📚 الروايات</a>
    <a href="#" class="menu-item">📺 القنوات</a>
    <a href="#" class="menu-item">🎶 قوائم التشغيل</a>
    <a href="#" class="menu-item">🕒 سجل المشاهدة</a>
    <a href="#" class="menu-item">⚙️ الإعدادات</a>
</div>


    <div class="main-content">
        <h1>مرحباً في Noxa</h1>
        <div class="grid-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px;">
    
    <div class="card" style="background: #1a1a1a; border-radius: 10px; padding: 10px; text-align: center;">
        <img src="رابط_صورة_المسلسل" style="width: 100%; height: 250px; object-fit: cover; border-radius: 5px;">
        <h4 style="margin: 10px 0;">اسم المسلسل</h4>
        <button style="background: #3498db; border: none; padding: 10px; width: 100%; color: white; border-radius: 5px;">مشاهدة</button>
    </div>

</div>

    </div>


    <script>
        function toggleSidebar() {
            var sidebar = document.getElementById("mySidebar");
            if (sidebar.style.display === "block") {
                sidebar.style.display = "none";
            } else {
                sidebar.style.display = "block";
            }
        }
    </script>
</body>
</html>
