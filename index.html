    <style>

</head>
<body>

    <!-- القائمة العلوية -->
    <nav class="flex items-center justify-between p-6 bg-black/50 backdrop-blur-md sticky top-0 z-50">

        <ul class="flex gap-6">
            <li><a href="#" class="hover:text-blue-400">الرئيسية</a></li>
            <li><a href="#" class="hover:text-blue-400">المسلسلات</a></li>
            <li><a href="#" class="hover:text-blue-400">الأفلام</a></li>

        </ul>

    </nav>

    <!-- واجهة معلومات المسلسل -->
<section class="relative w-full h-[500px] flex items-end p-10 bg-black">
    <div class="absolute inset-0 opacity-60 bg-cover bg-center" style="background-image: url('https://media.themoviedb.org/t/p/w220_and_h330_face/acYXu4KaDj1NIkMgObnhe4C4a0T.jpg');"></div>
    
    <div class="absolute inset-0 bg-gradient-to-t from-[#121212] via-transparent to-transparent"></div>

    <div class="relative z-10 max-w-2xl">

        <p class="text-gray-200 text-lg mb-6 leading-relaxed">
            باتريك جين يستخدم مهاراته الحادة في الملاحظة والاستنتاج لحل الجرائم.
        </p>
        <button class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-3 rounded-full font-bold shadow-lg shadow-blue-900/50 transition">
            مشاهدة الحلقة الأولى
        </button>
    </div>
</section>



    <!-- أقسام المواسم والحلقات -->
    <main class="p-10 max-w-6xl mx-auto">
        
        <!-- اختيار المواسم -->
        <div class="mb-8">
            <h2 class="text-2xl mb-4">المواسم</h2>
            <div class="flex gap-4">
                <button class="bg-gray-800 px-6 py-2 rounded border border-blue-500">الموسم 1</button>
                <button class="bg-gray-800 px-6 py-2 rounded hover:bg-gray-700">الموسم 2</button>
                <button class="bg-gray-800 px-6 py-2 rounded hover:bg-gray-700">الموسم 3</button>
            </div>
        </div>

        <!-- قائمة الحلقات -->
        <div class="grid gap-4">
            <h2 class="text-2xl mb-2">الحلقات</h2>
            <div class="bg-gray-900 p-4 rounded flex items-center gap-6 border border-gray-800">
                <div class="w-32 h-20 bg-gray-700 rounded"></div>
                <div>
                    <h3 class="font-bold">الحلقة 1: Pilot</h3>
                    <p class="text-gray-400 text-sm">مدة الحلقة: 42 دقيقة</p>
                </div>
            </div>
            <div class="bg-gray-900 p-4 rounded flex items-center gap-6 border border-gray-800">
                <div class="w-32 h-20 bg-gray-700 rounded"></div>
                <div>
                    <h3 class="font-bold">الحلقة 2: Red Hair and Silver Tape</h3>
                    <p class="text-gray-400 text-sm">مدة الحلقة: 41 دقيقة</p>
                </div>
            </div>
        </div>
    </main>
