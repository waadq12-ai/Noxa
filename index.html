<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noxa</title>
    <style>
        body { background-color: #0c0c0c; color: white; margin: 0; font-family: sans-serif; }
        .menu-btn { font-size: 20px; padding: 15px; cursor: pointer; color: #3498db; }
        
        /* تصميم القائمة */
        .sidebar { 
            display: none; position: fixed; top: 0; right: 0; width: 250px; height: 100%; 
            background: #111; padding: 20px; z-index: 1000; border-left: 1px solid #333;
        }
        .menu-item { display: block; padding: 15px; color: white; text-decoration: none; border-bottom: 1px solid #222; }

        /* شبكة المسلسلات */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #161616; border-radius: 10px; padding: 10px; text-align: center; }
        .btn-watch { background: #3498db; color: white; padding: 10px; border: none; border-radius: 5px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="document.getElementById('mySidebar').style.display='block'">☰ Noxa</div>

    <div class="sidebar" id="mySidebar">
        <div class="menu-item" onclick="document.getElementById('mySidebar').style.display='none'">✕ إغلاق</div>
        <a href="#" class="menu-item">🏠 الرئيسية</a>
        <a href="#" class="menu-item">🎬 المسلسلات</a>
    </div>

    <div class="grid-container">
        <div class="card">
            <div style="background:#444; height:150px; border-radius:5px;"></div>
            <h4>مسلسل 1</h4>
            <button class="btn-watch">مشاهدة</button>
        </div>
    </div>
<div class="card">
    <div style="background:#444; height:150px; border-radius:5px;"></div>
    <h4>اسم المسلسل</h4>
    <button class="btn-watch">مشاهدة</button>
</div>

</body>
</html>
