<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Noxa</title>
    <style>
    /* تنسيق الجسم الأساسي */
    body { background-color: #050505 !important; color: white !important; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

    /* جعل القائمة الجانبية غطاءً كاملاً للشاشة عند الفتح */
    .sidebar { 
        display: none; 
        position: fixed; 
        top: 0; 
        right: 0; 
        width: 100%;       /* تغطي العرض بالكامل */
        height: 100vh;     /* تغطي الارتفاع بالكامل */
        background: #000; 
        padding: 80px;     /* مسافات كبيرة لجعل العناصر تظهر بشكل "ضخم" */
        z-index: 9999;     /* لتظهر فوق كل شيء */
        box-sizing: border-box;
    }

    /* تكبير نصوص القائمة لتصبح واضحة جداً وضخمة */
    .menu-item { 
        padding: 40px 0; 
        font-size: 60px;   /* حجم خط كبير جداً */
        color: #fff; 
        cursor: pointer; 
        text-decoration: none; 
        display: block; 
        font-weight: 800;  /* خط عريض */
    }
    
    .menu-item:hover { color: #3498db; }

    /* تكبير زر الإغلاق */
    .close-btn { 
        font-size: 80px; 
        cursor: pointer; 
        color: white; 
        position: absolute; 
        top: 20px; 
        right: 40px; 
    }
</style>




</head>
<body>

    <div class="menu-btn" onclick="toggleSidebar()">☰ Noxa</div>

  <div class="sidebar" id="mySidebar">
    <div class="close-btn" onclick="toggleSidebar()">×</div>
    <div style="font-size: 80px; margin-bottom: 50px;">Noxa</div>
    <a href="index.html" class="menu-item">🏠 الرئيسية</a>
    <a href="#" class="menu-item">🎬 المسلسلات والأفلام</a>
    <a href="#" class="menu-item">📖 المانجا والمانهوا</a>
    <a href="#" class="menu-item">⚙️ الإعدادات</a>
</div>



    <div class="main-content">
        <h1>مرحباً في Noxa</h1>
        <div class="grid-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px;">
    
    <div class="card" style="background: #1a1a1a; border-radius: 10px; padding: 10px; text-align: center;">
        <img src="رابط_صورة_المسلسل" style="width: 100%; height: 250px; object-fit: cover; border-radius: 5px;">
        <h4 style="margin: 10px 0;">اسم المسلسل</h4>
        <button style="background: #3498db; border: none; padding: 10px; width: 100%; color: white; border-radius: 5px;">مشاهدة</button>
    </div>

</div>

    </div>


    <script>
        function toggleSidebar() {
            var sidebar = document.getElementById("mySidebar");
            if (sidebar.style.display === "block") {
                sidebar.style.display = "none";
            } else {
                sidebar.style.display = "block";
            }
        }
    </script>
</body>
</html>
