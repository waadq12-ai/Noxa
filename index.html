<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Noxa</title>
    <style>
    /* إزالة كل الهوامش ليتمدد الموقع لكامل الشاشة */
    body { background-color: #050505 !important; color: white !important; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

    /* جعل زر القائمة ضخم جداً */
    .menu-btn { font-size: 40px; cursor: pointer; padding: 40px; color: #fff; text-shadow: 0 0 10px #3498db; }

    /* القائمة الجانبية: غطاء كامل للشاشة (Full Screen) */
    .sidebar { 
        display: none; position: fixed; top: 0; right: 0; width: 100%; height: 100%; 
        background: #000; padding: 100px; z-index: 1000; box-sizing: border-box;
    }
    .menu-item { padding: 40px 0; font-size: 50px; color: #fff; cursor: pointer; text-decoration: none; display: block; font-weight: bold; }
    .menu-item:hover { color: #3498db; }

    /* الشبكة: بطاقات عملاقة جداً */
    .grid-container { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); /* تكبير العرض */
        gap: 60px; 
        padding: 60px; 
    }
    .card { 
        background: #111; border-radius: 30px; padding: 30px; text-align: center; 
        border: 2px solid #222;
    }
    .card img { width: 100%; height: 600px; object-fit: cover; border-radius: 20px; }
    .card h4 { font-size: 30px; margin: 20px 0; }
    
    /* زر مشاهدة عملاق */
    .btn-watch { 
        background: #3498db; color: white; padding: 25px; width: 100%; 
        border-radius: 15px; font-size: 24px; cursor: pointer; text-decoration: none; display: block;
    }
</style>



</head>
<body>

    <div class="menu-btn" onclick="toggleSidebar()">☰ Noxa</div>

  <div class="sidebar" id="mySidebar">
    <div class="menu-item" onclick="toggleSidebar()" style="text-align: left; padding: 10px;">✕</div>
    <h2>Noxa</h2>
    <a href="index.html" class="menu-item">🏠 الرئيسية</a>
    <a href="#" class="menu-item">🎬 المسلسلات والأفلام</a>
    <a href="#" class="menu-item">📖 المانجا والمانهوا</a>
    <a href="#" class="menu-item">📚 الروايات</a>
    <a href="#" class="menu-item">📺 القنوات</a>
    <a href="#" class="menu-item">🎶 قوائم التشغيل</a>
    <a href="#" class="menu-item">🕒 سجل المشاهدة</a>
    <a href="#" class="menu-item">⚙️ الإعدادات</a>
</div>


    <div class="main-content">
        <h1>مرحباً في Noxa</h1>
        <div class="grid-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px;">
    
    <div class="card" style="background: #1a1a1a; border-radius: 10px; padding: 10px; text-align: center;">
        <img src="رابط_صورة_المسلسل" style="width: 100%; height: 250px; object-fit: cover; border-radius: 5px;">
        <h4 style="margin: 10px 0;">اسم المسلسل</h4>
        <button style="background: #3498db; border: none; padding: 10px; width: 100%; color: white; border-radius: 5px;">مشاهدة</button>
    </div>

</div>

    </div>


    <script>
        function toggleSidebar() {
            var sidebar = document.getElementById("mySidebar");
            if (sidebar.style.display === "block") {
                sidebar.style.display = "none";
            } else {
                sidebar.style.display = "block";
            }
        }
    </script>
</body>
</html>
