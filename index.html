<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noxa</title>
    <style>
        body { background-color: #0c0c0c; color: white; margin: 0; font-family: sans-serif; }
        
        /* الزر */
        .menu-btn { font-size: 18px; padding: 12px; cursor: pointer; color: #fff; background: #222; display: inline-block; margin: 15px; border-radius: 8px; }
        
        /* الشبكة - لترتيب المسلسلات بذكاء */
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            padding: 15px; 
        }
        
        .card { background: #161616; padding: 10px; border-radius: 10px; text-align: center; }
        
        /* تصحيح شكل الصورة والزر */
        .poster { background: #333; height: 150px; border-radius: 8px; margin-bottom: 8px; }
        .btn-watch { background: #3498db; color: white; padding: 10px; border: none; border-radius: 5px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="alert('القائمة ستضاف لاحقاً')">☰ القائمة</div>

    <div class="grid-container">
        <div class="card">
            <div class="poster"></div>
            <h4>مسلسل 1</h4>
            <button class="btn-watch">مشاهدة</button>
        </div>
        <div class="card">
            <div class="poster"></div>
            <h4>مسلسل 2</h4>
            <button class="btn-watch">مشاهدة</button>
        </div>
    </div>

</body>
</html>
