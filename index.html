<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Noxa</title>
    <style>
        body { background-color: #0c0c0c !important; color: white !important; margin: 0; font-family: sans-serif; }
        .menu-btn { font-size: 24px; cursor: pointer; padding: 20px; color: #3498db; }
        .sidebar { 
            display: none; position: fixed; top: 0; right: 0; width: 250px; height: 100%; 
            background: #111; padding: 20px; z-index: 1000; border-left: 1px solid #333;
        }
        .menu-item { padding: 15px 0; color: #ccc; cursor: pointer; text-decoration: none; display: block; }
        .menu-item:hover { color: #3498db; }
        .main-content { padding: 20px; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleSidebar()">☰ Noxa</div>

    <div class="sidebar" id="mySidebar">
        <div class="menu-item" onclick="toggleSidebar()">✕ إغلاق</div>
        <h2>Noxa</h2>
        <a href="index.html" class="menu-item">🏠 الرئيسية</a>
    </div>

    <div class="main-content">
        <h1>مرحباً في Noxa</h1>
    </div>

    <script>
        function toggleSidebar() {
            var sidebar = document.getElementById("mySidebar");
            if (sidebar.style.display === "block") {
                sidebar.style.display = "none";
            } else {
                sidebar.style.display = "block";
            }
        }
    </script>
</body>
</html>
