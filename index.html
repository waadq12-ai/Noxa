<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noxa</title>
    <style>
        /* التنسيق العام */
        body { background-color: #0c0c0c !important; color: white !important; margin: 0; font-family: sans-serif; }

        /* تنسيق الزر الكبير والواضح */
        .header-container { padding: 30px; }
        .menu-btn { 
            font-size: 40px !important; 
            font-weight: bold !important; 
            cursor: pointer; 
            color: #ffffff !important; 
            padding: 25px 50px !important; 
            background-color: #1a1a1a !important; 
            border-radius: 20px !important; 
            display: inline-block !important; 
            border: 2px solid #3498db !important;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5) !important;
        }

        /* القائمة الجانبية المتوازنة */
        .sidebar { 
            display: none; position: fixed; top: 0; right: 0; width: 300px; height: 100%; 
            background: #111; padding: 40px 20px; z-index: 1000; border-left: 2px solid #3498db;
        }
        .menu-item { 
            padding: 25px 15px; font-size: 22px; color: #fff; 
            cursor: pointer; text-decoration: none; display: block; border-bottom: 1px solid #222;
        }
        .menu-item:hover { background: #222; color: #3498db; }
        .close-btn { font-size: 40px; cursor: pointer; color: white; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="menu-btn" onclick="toggleSidebar()">☰ Noxa</div>
    </div>

    <div class="sidebar" id="mySidebar">
        <div class="close-btn" onclick="toggleSidebar()">✕ إغلاق</div>
        <a href="index.html" class="menu-item">🏠 الرئيسية</a>
        <a href="#" class="menu-item">🎬 المسلسلات والأفلام</a>
        <a href="#" class="menu-item">📖 المانجا والمانهوا</a>
        <a href="#" class="menu-item">⚙️ الإعدادات</a>
    </div>

    <script>
        function toggleSidebar() {
            var sidebar = document.getElementById("mySidebar");
            if (sidebar.style.display === "block") {
                sidebar.style.display = "none";
            } else {
                sidebar.style.display = "block";
            }
        }
    </script>
</body>
</html>
