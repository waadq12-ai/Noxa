<style>
    /* تنسيق الخلفية والشبكة */
    body { background-color: #0c0c0c; color: white; font-family: sans-serif; margin: 0; }
    
    .grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
        gap: 15px; 
        padding: 20px; 
    }
    
    /* تنسيق كل بطاقة فيلم */
    .card { background: #1a1a1a; border-radius: 10px; overflow: hidden; }
    .card img { width: 100%; height: 200px; object-fit: cover; }
    .card-content { padding: 10px; }
    .title { font-size: 14px; margin: 5px 0; }
    .info { font-size: 12px; color: #888; }
</style>

<!-- هيكل البطاقات -->
<div class="grid">
    <!-- مثال لبطاقة واحدة، يمكنك تكرارها -->
    <div class="card">
        <img src="رابط_صورة_الفيلم" alt="Movie">
        <div class="card-content">
            <div class="title">اسم المسلسل</div>
            <div class="info">2026 • finished</div>
        </div>
    </div>
</div>
