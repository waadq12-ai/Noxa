<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Noxa</title>
    <style>
        body { background-color: #0c0c0c; color: white; margin: 0; font-family: sans-serif; }
        .menu-btn { font-size: 15px; padding: 12px; cursor: pointer; color: #3498db; }
        
        /* شبكة المسلسلات */
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 12px; 
            padding: 15px; 
        }
        .card { background: #161616; border-radius: 10px; padding: 10px; text-align: center; }
        .btn-watch { background: #3498db; color: white; padding: 10px; border: none; border-radius: 5px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="alert('القائمة تعمل!')">☰ Noxa</div>

    <div class="grid-container">
        <div class="card">
            <div style="background:#444; height:150px; border-radius:5px;"></div>
            <h4>اسم المسلسل 1</h4>
            <button class="btn-watch">مشاهدة</button>
        </div>
        <div class="card">
            <div style="background:#444; height:150px; border-radius:5px;"></div>
            <h4>اسم المسلسل 2</h4>
            <button class="btn-watch">مشاهدة</button>
        </div>
    </div>

</body>
</html>
