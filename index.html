<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noxa</title>
    <style>
    body { background-color: #0c0c0c !important; color: white !important; margin: 0; font-family: sans-serif; }

    /* زر Noxa المتوازن: حجم مريح للعين وللضغط */
    .menu-btn { 
        font-size: 20px !important; 
        padding: 15px 30px !important; 
        cursor: pointer; 
        background: #1a1a1a; 
        border: 1px solid #3498db; 
        border-radius: 12px; 
        display: inline-block; 
        margin: 15px;
    }

    /* القائمة الجانبية: متوازنة */
    .sidebar { 
        display: none; position: fixed; top: 0; right: 0; width: 250px; height: 100%; 
        background: #111; padding: 20px; z-index: 1000;
    }
    .menu-item { padding: 15px; font-size: 18px; color: white; text-decoration: none; display: block; }

    /* بطاقة المسلسل المتوازنة */
    .card { 
        background: #161616; border-radius: 12px; padding: 12px; 
        width: 160px; text-align: center; margin: 15px; 
    }
    .btn-watch { 
        background: #3498db; color: white; padding: 8px; width: 100%; 
        border: none; border-radius: 6px; font-size: 14px; margin-top: 8px; cursor: pointer; 
    }
</style>

</head>
<body>

    <div class="header-container">
        <div class="menu-btn" onclick="toggleSidebar()">☰ Noxa</div>
    </div>

    <div class="sidebar" id="mySidebar">
        <div class="close-btn" onclick="toggleSidebar()">✕ إغلاق</div>
        <a href="index.html" class="menu-item">🏠 الرئيسية</a>
        <a href="#" class="menu-item">🎬 المسلسلات والأفلام</a>
        <a href="#" class="menu-item">📖 المانجا والمانهوا</a>
        <a href="#" class="menu-item">⚙️ الإعدادات</a>
    </div>

    <script>
        function toggleSidebar() {
            var sidebar = document.getElementById("mySidebar");
            if (sidebar.style.display === "block") {
                sidebar.style.display = "none";
            } else {
                sidebar.style.display = "block";
            }
        }
    </script>
</body>
</html>
