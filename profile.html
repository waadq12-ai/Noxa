<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex">

    <aside class="w-64 border-l border-gray-800 p-6">
        <h2 class="text-2xl font-bold mb-10">Noxa</h2>
        <nav class="space-y-6">
            <a href="index.html" class="block text-xl hover:text-blue-500">الرئيسية</a>
            <a href="settings.html" class="block text-xl hover:text-blue-500">الإعدادات العامة</a>
            <a href="profile.html" class="block text-xl text-blue-500 font-bold">الملف الشخصي والسجل</a>
            <button onclick="logout()" class="block text-xl text-red-500 font-bold mt-10">تسجيل الخروج</button>
        </nav>
    </aside>

    <main class="flex-1 p-12">
        <h1 class="text-4xl font-bold mb-8">الملف الشخصي والسجل</h1>

        <div class="bg-gray-900 p-8 rounded-3xl mb-12 max-w-2xl">
            <div class="flex items-center gap-6 mb-6">
                <img id="profilePreview" src="https://via.placeholder.com/150" class="w-24 h-24 rounded-full object-cover border-2 border-gray-700">
                <input type="file" id="imageInput" accept="image/*" onchange="previewImage()">
            </div>
            <p class="mb-4">المستخدم: <span id="currentUsername" class="font-bold"></span></p>
            <input type="text" id="editName" placeholder="اسم العرض" class="w-full p-3 rounded-xl bg-black border border-gray-700 mb-4">
            <button onclick="saveProfile()" class="bg-blue-600 px-6 py-2 rounded-xl font-bold">حفظ التغييرات</button>
        </div>

        <h2 class="text-3xl font-bold mb-6">سجل المشاهدة</h2>
        <ul id="history-list" class="space-y-4 max-w-2xl"></ul>
    </main>

    <script>
        const user = localStorage.getItem('currentUser');
        document.getElementById('currentUsername').innerText = user;

        // تحميل البيانات (الصورة والاسم والسجل)
        window.onload = function() {
            // تحميل البروفايل
            const profile = JSON.parse(localStorage.getItem('profile_' + user));
            if (profile) document.getElementById('editName').value = profile.name || "";
            const savedImg = localStorage.getItem('profile_img_' + user);
            if (savedImg) document.getElementById('profilePreview').src = savedImg;

            // تحميل السجل
            const history = JSON.parse(localStorage.getItem('myHistory_' + user)) || [];
            const list = document.getElementById('history-list');
            list.innerHTML = history.length ? history.map(item => `
                <li class="bg-gray-900 p-4 rounded-xl flex justify-between">${item}</li>
            `).join('') : "<li class='text-gray-500'>لا توجد مشاهدات حالياً</li>";
        };

        function previewImage() {
            const file = document.getElementById('imageInput').files[0];
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('profilePreview').src = e.target.result;
                localStorage.setItem('profile_img_' + user, e.target.result);
            };
            reader.readAsDataURL(file);
        }

        function saveProfile() {
            const newName = document.getElementById('editName').value;
            localStorage.setItem('profile_' + user, JSON.stringify({ name: newName }));
            alert("تم حفظ البيانات!");
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
