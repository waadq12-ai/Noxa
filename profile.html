<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex">

    <aside class="w-72 bg-black border-l border-gray-800 p-8">
        <h2 class="text-3xl font-bold mb-12">Noxa</h2>
        <nav class="space-y-8">
            <a href="settings.html" class="block text-2xl text-gray-400 hover:text-white">الإعدادات العامة</a>
            <a href="profile.html" class="block text-2xl font-bold text-white">الملف الشخصي</a>
            <a href="history.html" class="block text-2xl text-gray-400 hover:text-white">سجل المشاهدة</a>
            <button onclick="logout()" class="block text-2xl text-red-500 font-bold hover:text-red-400">تسجيل الخروج</button>
        </nav>
    </aside>

    <main class="flex-1 p-12">
        <h1 class="text-5xl font-bold mb-12">الملف الشخصي</h1>

        <div class="bg-gray-900 p-10 rounded-3xl max-w-2xl">
            <div class="flex items-center gap-8 mb-10">
                <img id="profilePreview" src="https://via.placeholder.com/150" class="w-32 h-32 rounded-full object-cover border-4 border-blue-600">
                <div>
                    <h2 class="text-3xl font-bold" id="displayNameDisplay">اسم المستخدم</h2>
                    <input type="file" id="imageInput" accept="image/*" class="mt-4 text-sm" onchange="previewImage()">
                </div>
            </div>

            <label class="text-xl block mb-2">اسم العرض</label>
            <input type="text" id="editName" class="w-full p-4 mb-6 rounded-xl bg-black text-white text-xl border border-gray-700">
            
            <label class="text-xl block mb-2">نبذة عني</label>
            <textarea id="editBio" class="w-full p-4 mb-8 rounded-xl bg-black text-white text-xl border border-gray-700" rows="3"></textarea>
            
            <button onclick="saveProfile()" class="w-full bg-blue-600 px-8 py-4 rounded-xl text-xl font-bold hover:bg-blue-700">حفظ التغييرات</button>
        </div>
    </main>

    <script>
        let uploadedImage = "";

        // عرض الصورة قبل الحفظ
        function previewImage() {
            const file = document.getElementById('imageInput').files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedImage = e.target.result;
                document.getElementById('profilePreview').src = uploadedImage;
            }
            reader.readAsDataURL(file);
        }

        // حفظ البيانات
        function saveProfile() {
            const user = localStorage.getItem('currentUser');
            const newName = document.getElementById('editName').value;
            const newBio = document.getElementById('editBio').value;
            const dataToSave = { name: newName, bio: newBio, image: uploadedImage };
            
            localStorage.setItem('profile_' + user, JSON.stringify(dataToSave));
            document.getElementById('displayNameDisplay').innerText = newName;
            alert("تم حفظ الملف الشخصي بنجاح!");
        }

        // تحميل البيانات
        window.onload = function() {
            const user = localStorage.getItem('currentUser');
            if (!user) { window.location.href = "login.html"; return; }
            
            const profile = JSON.parse(localStorage.getItem('profile_' + user));
            if (profile) {
                document.getElementById('editName').value = profile.name || "";
                document.getElementById('editBio').value = profile.bio || "";
                document.getElementById('displayNameDisplay').innerText = profile.name || user;
                if (profile.image) {
                    document.getElementById('profilePreview').src = profile.image;
                    uploadedImage = profile.image;
                }
            }
        };

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
