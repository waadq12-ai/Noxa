<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex text-2xl">

    <aside class="w-80 border-l border-gray-800 p-10">
        <h2 class="text-5xl font-bold mb-16">Noxa</h2>
        <nav class="space-y-10">
            <a href="index.html" class="block text-3xl text-gray-400 hover:text-white">الرئيسية</a>
            <a href="settings.html" class="block text-3xl text-gray-400 hover:text-white">الإعدادات العامة</a>
            
            <a href="profile.html" class="block text-3xl text-white font-bold underline">الملف الشخصي</a>
            
            <button onclick="logout()" class="block text-3xl text-red-500 font-bold mt-20">تسجيل الخروج</button>
        </nav>
    </aside>

    <main class="flex-1 p-16">
        <h1 class="text-7xl font-bold mb-16 text-white">الملف الشخصي</h1>

        <div class="bg-gray-900 p-12 rounded-[3rem] max-w-3xl">
            
            <div class="flex items-center gap-10 mb-12">
                <img id="profilePreview" src="https://via.placeholder.com/150" class="w-40 h-40 rounded-full object-cover border-4 border-gray-700">
                <input type="file" id="imageInput" accept="image/*" class="text-2xl" onchange="previewImage()">
            </div>

            <label class="block mb-4 font-bold text-3xl text-white">اسم المستخدم (للدخول):</label>
            <input type="text" id="editUsername" class="w-full p-6 rounded-2xl bg-black border-2 border-gray-700 text-2xl mb-8 text-white">

            <label class="block mb-4 font-bold text-3xl text-white">اسم العرض:</label>
            <input type="text" id="editDisplayName" class="w-full p-6 rounded-2xl bg-black border-2 border-gray-700 text-2xl mb-12 text-white">
            
            <button onclick="saveAll()" class="bg-blue-600 w-full py-8 rounded-2xl text-4xl font-bold hover:bg-blue-700 text-white">حفظ التعديلات</button>
        </div>
    </main>

    <script>
        const oldUser = localStorage.getItem('currentUser');
        window.onload = function() {
            document.getElementById('editUsername').value = oldUser;
            const profile = JSON.parse(localStorage.getItem('profile_' + oldUser));
            if (profile) document.getElementById('editDisplayName').value = profile.name || "";
            const img = localStorage.getItem('profile_img_' + oldUser);
            if (img) document.getElementById('profilePreview').src = img;
        };

        function saveAll() {
            const newUsername = document.getElementById('editUsername').value;
            const newDisplayName = document.getElementById('editDisplayName').value;
            localStorage.setItem('currentUser', newUsername);
            localStorage.setItem('profile_' + newUsername, JSON.stringify({ name: newDisplayName }));
            alert("تم حفظ التعديلات بنجاح!");
            location.reload();
        }

        function previewImage() {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('profilePreview').src = e.target.result;
                localStorage.setItem('profile_img_' + oldUser, e.target.result);
            };
            reader.readAsDataURL(document.getElementById('imageInput').files[0]);
        }
        
        function logout() { localStorage.removeItem('currentUser'); window.location.href = "login.html"; }
    </script>
</body>
</html>
