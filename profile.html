<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // الحماية
        if (!localStorage.getItem('currentUser')) {
            window.location.href = "login.html";
        }
    </script>
</head>
<body class="bg-[#121212] text-white min-h-screen flex text-2xl">

    <aside class="w-80 border-l border-gray-800 p-10 bg-black min-h-screen">
        <h2 class="text-5xl font-bold mb-16 text-white">Noxa</h2>
        <nav id="nav-menu" class="space-y-10">
            <a href="index.html" class="block text-3xl text-gray-400 hover:text-white transition">الرئيسية</a>
            <a href="settings.html" class="block text-3xl text-gray-400 hover:text-white transition">الإعدادات العامة</a>
            <a href="profile.html" class="block text-3xl text-white font-bold underline transition">الملف الشخصي</a>
        </nav>
    </aside>

    <main class="flex-1 p-16">
        <h1 class="text-7xl font-bold mb-16 text-white">الملف الشخصي</h1>

        <div class="bg-gray-900 p-12 rounded-[3rem] max-w-3xl mb-16">
            <div class="flex items-center gap-10 mb-12">
                <img id="profilePreview" src="https://via.placeholder.com/150" class="w-40 h-40 rounded-full object-cover border-4 border-gray-700">
                <input type="file" id="imageInput" accept="image/*" class="text-2xl" onchange="previewImage()">
            </div>
            <label class="block mb-4 font-bold text-3xl">اسم المستخدم:</label>
            <input type="text" id="editUsername" class="w-full p-6 rounded-2xl bg-black border-2 border-gray-700 text-2xl mb-8">
            <label class="block mb-4 font-bold text-3xl">اسم العرض:</label>
            <input type="text" id="editDisplayName" class="w-full p-6 rounded-2xl bg-black border-2 border-gray-700 text-2xl mb-12">
            <button onclick="saveAll()" class="bg-blue-600 w-full py-8 rounded-2xl text-4xl font-bold hover:bg-blue-700">حفظ التعديلات</button>
        </div>

        <h2 class="text-5xl font-bold mb-10">سجل المشاهدة</h2>
        <ul id="history-list" class="space-y-6 max-w-3xl"></ul>
    </main>

    <script>
        const oldUser = localStorage.getItem('currentUser');
        const navMenu = document.getElementById('nav-menu');

        // تنفيذ كل دوال التحميل عند فتح الصفحة
        window.onload = function() {
            // 1. تحميل الإعدادات (الثيم والخط)
            const savedTheme = localStorage.getItem('siteTheme');
            const savedSize = localStorage.getItem('fontSize');
            if (savedTheme) document.body.className = savedTheme + " text-white min-h-screen flex";
            if (savedSize) document.body.style.fontSize = savedSize + "px";

            // 2. تحميل بيانات الملف الشخصي
            document.getElementById('editUsername').value = oldUser;
            const profile = JSON.parse(localStorage.getItem('profile_' + oldUser));
            if (profile) document.getElementById('editDisplayName').value = profile.name || "";
            const img = localStorage.getItem('profile_img_' + oldUser);
            if (img) document.getElementById('profilePreview').src = img;

            // 3. تحميل السجل والأزرار
            loadHistory();
            if (oldUser) {
                navMenu.innerHTML += `
                    <button onclick="logout()" class="block text-3xl text-red-500 font-bold mt-20 hover:text-red-400">تسجيل الخروج</button>
                    <button onclick="deleteAccount()" class="block text-3xl text-red-500 font-bold mt-6 hover:text-red-400">حذف الحساب</button>
                `;
            }
        };

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('myHistory_' + oldUser)) || [];
            const list = document.getElementById('history-list');
            list.innerHTML = history.length === 0 ? 
                "<li class='text-2xl text-gray-400 p-8 bg-gray-900 rounded-2xl'>لا توجد مشاهدات حالياً</li>" :
                history.map(item => `<li class="bg-gray-900 p-8 rounded-2xl text-2xl">${item}</li>`).join('');
        }

        function saveAll() {
            const newUsername = document.getElementById('editUsername').value;
            const newDisplayName = document.getElementById('editDisplayName').value;
            const history = localStorage.getItem('myHistory_' + oldUser);
            if (history) localStorage.setItem('myHistory_' + newUsername, history);
            localStorage.setItem('currentUser', newUsername);
            localStorage.setItem('profile_' + newUsername, JSON.stringify({ name: newDisplayName }));
            alert("تم حفظ البيانات!");
            location.reload();
        }

        function previewImage() {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('profilePreview').src = e.target.result;
                localStorage.setItem('profile_img_' + oldUser, e.target.result);
            };
            reader.readAsDataURL(document.getElementById('imageInput').files[0]);
        }

        function logout() { localStorage.removeItem('currentUser'); window.location.href = "login.html"; }
        function deleteAccount() {
            if (confirm("هل أنت متأكد؟")) {
                localStorage.removeItem('user_' + oldUser);
                localStorage.removeItem('currentUser');
                window.location.href = "login.html";
            }
        }
    </script>
</body>
</html>
