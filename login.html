<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1c1c1c; padding: 40px; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 20px; margin: 15px 0; border-radius: 15px; border: none; background: #333; color: white; font-size: 20px; box-sizing: border-box; }
        button { width: 100%; padding: 20px; margin-top: 10px; border-radius: 15px; border: none; background: #007bff; color: white; font-size: 20px; font-weight: bold; cursor: pointer; }
        h1 { font-size: 32px; margin-bottom: 20px; }
        a { color: #007bff; cursor: pointer; display: block; margin-top: 20px; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginSection">
        <h1 id="title">تسجيل الدخول</h1>
        <input type="text" id="user" placeholder="اسم المستخدم">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button onclick="handleAction()">دخول</button>
        <a id="toggleText" onclick="toggleMode()">ليس لديك حساب؟ أنشئ واحداً</a>
    </div>
</div>

<script>
    let isLogin = true;

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById('title').innerText = isLogin ? "تسجيل الدخول" : "إنشاء حساب جديد";
        document.getElementById('toggleText').innerText = isLogin ? "ليس لديك حساب؟ أنشئ واحداً" : "لديك حساب؟ سجل دخولك";
    }

    function handleAction() {
        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;
        let users = JSON.parse(localStorage.getItem('usersDB')) || [];

        if (isLogin) {
            const found = users.find(u => u.name === user && u.pass === pass);
            if(found) {
                localStorage.setItem('currentUser', user);
                window.location.href = "index.html";
            } else {
                alert("بيانات غير صحيحة");
            }
        } else {
            if(users.find(u => u.name === user)) return alert("المستخدم موجود!");
            users.push({name: user, pass: pass});
            localStorage.setItem('usersDB', JSON.stringify(users));
            alert("تم إنشاء الحساب! سجل دخولك الآن.");
            toggleMode();
        }
    }
</script>
</body>
</html>
