<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center">

    <div class="bg-gray-900 p-12 rounded-[3rem] w-full max-w-lg shadow-2xl">
        <h1 class="text-5xl font-bold mb-10 text-center">Noxa</h1>
        
        <label class="block mb-4 text-2xl font-bold">اسم المستخدم:</label>
        <input type="text" id="username" class="w-full p-6 rounded-2xl bg-black border-2 border-gray-700 text-2xl mb-8 text-white">
        
        <!-- زرين لتوضيح العملية -->
        <div class="grid grid-cols-2 gap-4">
            <button onclick="register()" class="bg-green-600 py-6 rounded-2xl text-2xl font-bold hover:bg-green-700">تسجيل حساب جديد</button>
            <button onclick="login()" class="bg-blue-600 py-6 rounded-2xl text-2xl font-bold hover:bg-blue-700">دخول</button>
        </div>
    </div>

    <script>
        // دالة التسجيل (تمنع التكرار)
        function register() {
            const username = document.getElementById('username').value.trim();
            
            if (username === "") { alert("الرجاء إدخال اسم!"); return; }

            // التحقق إذا كان اليوزر موجوداً مسبقاً
            if (localStorage.getItem('profile_' + username)) {
                alert("عذراً، هذا الاسم مستخدم مسبقاً! جرب اسماً آخر.");
            } else {
                // إنشاء حساب جديد
                localStorage.setItem('profile_' + username, JSON.stringify({ name: username }));
                alert("تم إنشاء حسابك بنجاح! يمكنك الدخول الآن.");
            }
        }

        // دالة الدخول (تتأكد من وجود الحساب)
        function login() {
            const username = document.getElementById('username').value.trim();
            
            if (localStorage.getItem('profile_' + username)) {
                localStorage.setItem('currentUser', username);
                window.location.href = "index.html";
            } else {
                alert("هذا المستخدم غير موجود! يرجى التسجيل أولاً.");
            }
        }
    </script>
</body>
</html>
