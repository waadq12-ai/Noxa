<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center">

    <div class="bg-gray-900 p-12 rounded-[3rem] w-full max-w-lg shadow-2xl">
        <h1 class="text-5xl font-bold mb-10 text-center">Noxa</h1>
        
        <label class="block mb-4 text-2xl font-bold">اسم المستخدم:</label>
        <input type="text" id="username" class="w-full p-6 rounded-2xl bg-black border-2 border-gray-700 text-2xl mb-8 text-white">
        
        <label class="block mb-4 text-2xl font-bold">كلمة المرور:</label>
        <input type="password" id="password" class="w-full p-6 rounded-2xl bg-black border-2 border-gray-700 text-2xl mb-10 text-white">
        
        <div class="grid grid-cols-2 gap-4">
            <button onclick="register()" class="bg-green-600 py-6 rounded-2xl text-2xl font-bold hover:bg-green-700 transition">تسجيل جديد</button>
            <button onclick="login()" class="bg-blue-600 py-6 rounded-2xl text-2xl font-bold hover:bg-blue-700 transition">دخول</button>
        </div>
    </div>

    <script>
        function register() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) { alert("الرجاء إدخال اسم المستخدم وكلمة المرور!"); return; }

            if (localStorage.getItem('user_' + username)) {
                alert("هذا المستخدم موجود مسبقاً!");
            } else {
                localStorage.setItem('user_' + username, JSON.stringify({ password: password, name: username }));
                alert("تم التسجيل! يمكنك الدخول الآن.");
            }
        }

        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            const userData = JSON.parse(localStorage.getItem('user_' + username));
            
            if (userData && userData.password === password) {
                localStorage.setItem('currentUser', username);
                window.location.href = "index.html";
            } else {
                alert("اسم المستخدم أو كلمة المرور غير صحيحة!");
            }
        }
    </script>
</body>
</html>
