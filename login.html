<!DOCTYPE html>
<html lang="ar" dir="rtl">
<body style="background:#000; color:#fff; text-align:center; padding:50px;">

    <h1>مرحباً بك</h1>
    
    <div id="loginSection">
        <h2>تسجيل الدخول</h2>
        <input type="text" id="lUser" placeholder="اسم المستخدم"><br>
        <input type="password" id="lPass" placeholder="كلمة المرور"><br>
        <button onclick="login()">دخول</button>
        <p onclick="showSignUp()">ليس لديك حساب؟ <a>أنشئ حساباً جديداً</a></p>
    </div>

    <div id="signUpSection" style="display:none;">
        <h2>إنشاء حساب جديد</h2>
        <input type="text" id="sUser" placeholder="اسم المستخدم"><br>
        <input type="password" id="sPass" placeholder="كلمة المرور"><br>
        <button onclick="signUp()">تسجيل</button>
    </div>

    <script>
        function showSignUp() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('signUpSection').style.display = 'block';
        }

        // إنشاء حساب
        function signUp() {
            const user = document.getElementById('sUser').value;
            const pass = document.getElementById('sPass').value;
            
            // تخزين الحساب في قائمة (usersDB)
            let users = JSON.parse(localStorage.getItem('usersDB')) || [];
            if(users.find(u => u.name === user)) {
                alert("المستخدم موجود بالفعل!");
                return;
            }
            users.push({name: user, pass: pass});
            localStorage.setItem('usersDB', JSON.stringify(users));
            alert("تم إنشاء الحساب بنجاح! يمكنك تسجيل الدخول الآن.");
            location.reload();
        }

        // تسجيل الدخول
        function login() {
            const user = document.getElementById('lUser').value;
            const pass = document.getElementById('lPass').value;
            let users = JSON.parse(localStorage.getItem('usersDB')) || [];
            
            const found = users.find(u => u.name === user && u.pass === pass);
            if(found) {
                localStorage.setItem('currentUser', user);
                window.location.href = "index.html";
            } else {
                alert("خطأ في البيانات");
            }
        }
    </script>
</body>
</html>
