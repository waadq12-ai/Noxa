<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مشاهدة المسلسل</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; }
        .video-player { width: 100%; height: 300px; background: #111; display: flex; align-items: center; justify-content: center; }
        
        /* أزرار السيرفرات */
        .servers { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
        .btn-server { background: #222; border: 1px solid #444; color: white; padding: 15px; text-align: center; cursor: pointer; border-radius: 5px; }
        .btn-server:hover { background: #3498db; }
    </style>
</head>
<body>

    <div class="video-player">
        <iframe id="main-video" src="رابط_السيرفر_الأول" width="100%" height="100%" allowfullscreen></iframe>
    </div>

    <h2 style="padding-right: 20px;">اسم المسلسل - الحلقة 1</h2>

    <div class="servers">
        <div class="btn-server" onclick="changeVideo('رابط_Vkvideo')">Vkvideo</div>
        <div class="btn-server" onclick="changeVideo('رابط_Mixdrop')">Mixdrop</div>
        <div class="btn-server" onclick="changeVideo('رابط_Vidmoly')">Vidmoly</div>
    </div>

    <script>
        function changeVideo(url) {
            document.getElementById('main-video').src = url;
        }
    </script>
</body>
</html>
