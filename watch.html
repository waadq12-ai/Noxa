<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noxa</title>
    <style>
        body { background-color: #0c0c0c; color: white; margin: 0; font-family: sans-serif; }
        
        /* ضبط العنوان والقائمة */
        .header { text-align: center; padding: 20px; }
        
        /* الشبكة (Grid) - هذا هو الجزء الأهم للترتيب */
        .grid-container { 
            display: grid; 
            /* هذا السطر يضمن أن البطاقات تترتب تلقائياً بجانب بعضها */
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 15px; 
            padding: 15px; 
        }
        
        .card { background: #161616; padding: 10px; border-radius: 10px; text-align: center; }
        
        .poster { background: #333; height: 160px; border-radius: 8px; margin-bottom: 8px; }
        
        .btn-watch { background: #3498db; color: white; padding: 10px; border: none; border-radius: 6px; width: 100%; cursor: pointer; text-decoration: none; display: block; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Noxa</h1>
    </div>

    <div class="grid-container">
        <div class="card">
            <div class="poster"></div>
            <h4>المنتاليست</h4>
            <a href="watch.html" class="btn-watch">مشاهدة</a>
        </div>
        
        <div class="card">
            <div class="poster"></div>
            <h4>مسلسل 2</h4>
            <a href="watch.html" class="btn-watch">مشاهدة</a>
        </div>
    </div>

</body>
</html>
