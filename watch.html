<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    // هذا الكود يتحقق إذا كان هناك مستخدم مسجل
    const currentUser = localStorage.getItem('currentUser');
    
    // إذا لم يجد مستخدماً، يمنعه من الدخول ويرسله لصفحة تسجيل الدخول
    if (!currentUser) {
        window.location.href = "login.html";
    }
</script>

    <title>The Mentalist - الحلقة 1</title>
</head>
<body class="bg-[#121212] text-white min-h-screen flex flex-col items-center p-6">

    <h2 class="text-4xl font-bold mb-8 text-center">مشاهدة الحلقة الأولى - The Mentalist</h2>

    <div class="w-full max-w-5xl bg-black p-2 rounded-2xl shadow-2xl border border-gray-800">
        <div class="relative w-full pt-[56.25%]">
            <iframe 
                src="https://mixdrop.top/e/039vqwj3uklrpmv" 
                class="absolute inset-0 w-full h-full rounded-xl"
                allowfullscreen 
                scrolling="no">
            </iframe>
        </div>
    </div>

    <a href="series-info.html?id=mentalist" class="mt-10 bg-gray-800 hover:bg-gray-700 text-white font-bold py-4 px-10 rounded-2xl transition text-xl">
        العودة لصفحة المسلسل
    </a>

    <script>
        window.onload = function() {
            const user = localStorage.getItem('currentUser');
            // اسم الحلقة الذي سيظهر في سجل المشاهدة
            const episodeTitle = "The Mentalist - الحلقة 1";

            if (!user) return; // إذا لم يسجل دخول، لا تحفظ

            // مفتاح التخزين الموحد
            let storageKey = 'myHistory_' + user;
            
            // جلب السجل الحالي أو إنشاء مصفوفة فارغة
            let history = JSON.parse(localStorage.getItem(storageKey)) || [];
            
            // إضافة الحلقة للسجل إذا لم تكن موجودة لمنع التكرار
            if (!history.includes(episodeTitle)) {
                history.push(episodeTitle);
                localStorage.setItem(storageKey, JSON.stringify(history));
                console.log("تم إضافة الحلقة للسجل!");
            }
        };
    </script>
</body>
</html>
