<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مشاهدة</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; }
        .video-box { width: 100%; height: 300px; background: #111; }
        .servers { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
        .btn-s { background: #222; padding: 15px; text-align: center; cursor: pointer; border: 1px solid #444; border-radius: 5px; }
        .btn-s:hover { background: #3498db; }
    </style>
</head>
<body>
    <div class="video-box">
        <iframe id="player" src="" width="100%" height="100%" allowfullscreen></iframe>
    </div>
    
    <div class="servers">
        <div class="btn-s" onclick="document.getElementById('player').src='رابط_سيرفر_1'">Vkvideo</div>
        <div class="btn-s" onclick="document.getElementById('player').src='رابط_سيرفر_2'">Mixdrop</div>
    </div>

    <script>
        // رابط افتراضي عند فتح الصفحة
        document.getElementById('player').src = 'رابط_سيرفر_1';
    </script>
</body>
</html>
