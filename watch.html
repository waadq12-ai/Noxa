<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <head>
    <title>قيامة عثمان - الحلقة 1</title>
</head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>مشاهدة الحلقة | Noxa</title>
</head>
<body class="bg-[#121212] text-white min-h-screen flex flex-col items-center p-6">

    <!-- العنوان بتصميم ضخم ومريح -->
    <h2 class="text-3xl font-bold mb-8 text-center">مشاهدة الحلقة الأولى - The Mentalist</h2>

    <!-- حاوية الفيديو مع إطار وتصميم Noxa -->
    <div class="w-full max-w-5xl bg-black p-2 rounded-2xl shadow-2xl border border-gray-800">
        <div class="relative w-full pt-[56.25%]">
            <iframe 
                src="https://mixdrop.top/e/039vqwj3uklrpmv" 
                class="absolute inset-0 w-full h-full rounded-xl"
                allowfullscreen 
                scrolling="no">
            </iframe>
        </div>
    </div>

    <!-- زر العودة -->
    <a href="series-info.html?id=mentalist" class="mt-10 bg-gray-800 hover:bg-gray-700 text-white font-bold py-3 px-8 rounded-xl transition">
        العودة لصفحة المسلسل
    </a>
<body>
    <button onclick="addToHistory('الحلقة رقم 1')">شاهدت الحلقة 1</button>

   <script>
    window.onload = function() {
        // سيأخذ اسم المسلسل والحلقة من عنوان الصفحة (العنوان الموجود في الـ title)
        const episodeInfo = document.title; 
        
        let history = JSON.parse(localStorage.getItem('myHistory')) || [];
        
        // التحقق من عدم التكرار
        if (!history.includes(episodeInfo)) {
            history.push(episodeInfo);
            localStorage.setItem('myHistory', JSON.stringify(history));
        }
    };
</script>


</body>

</body>
