<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // الحماية: التحقق من تسجيل الدخول
        if (!localStorage.getItem('currentUser')) {
            window.location.href = "login.html";
        }
    </script>
</head>
<body class="bg-[#121212] text-white font-sans">

    <header class="h-[450px] bg-gray-800 flex items-end p-16 shadow-2xl">
        <h1 id="title" class="text-6xl font-extrabold">جاري التحميل...</h1>
    </header>

    <main class="p-16">
        <h2 class="text-4xl font-bold mb-10 border-r-4 border-blue-500 pr-6">حلقات الموسم الأول</h2>
        
        <div class="bg-gray-900 p-8 rounded-3xl flex justify-between items-center shadow-lg border border-gray-800">
            <span class="text-2xl font-medium">الحلقة 1: Pilot</span>
            <a href="watch.html" class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-4 rounded-xl font-bold text-lg transition duration-300">
                تشغيل الحلقة
            </a>
        </div>
    </main>

   <script>
    // 1. عند فتح أي صفحة، طبق الإعدادات المحفوظة فوراً
    window.onload = () => {
        // استرجاع الإعدادات
        const savedTheme = localStorage.getItem('siteTheme') || 'bg-black';
        const savedSize = localStorage.getItem('fontSize') || '20';
        
        // تطبيق اللون على القائمة والمحتوى (الذي أعطيناهم IDs في الخطوة السابقة)
        const sidebar = document.getElementById('sidebar');
        const main = document.getElementById('mainContent');
        
        if (sidebar) sidebar.className = "w-80 border-l border-gray-800 p-10 min-h-screen " + savedTheme;
        if (main) main.className = "flex-1 p-16 " + savedTheme;
        
        // تطبيق الخط
        document.body.style.fontSize = savedSize + "px";
    };
</script>


</body>
</html>
