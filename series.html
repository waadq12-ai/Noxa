<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // الحماية
        if (!localStorage.getItem('currentUser')) {
            window.location.href = "login.html";
        }
    </script>
</head>
<body class="bg-[#121212] text-white font-sans">

    <nav class="p-10 bg-black flex justify-between items-center border-b border-gray-800">
        <div class="text-4xl font-bold text-blue-500">Noxa</div>
        <a href="index.html" class="text-xl bg-gray-800 hover:bg-gray-700 px-8 py-3 rounded-xl transition">العودة للرئيسية</a>
    </nav>

    <main class="p-16">
        <h1 class="text-5xl font-bold mb-16 border-r-8 border-blue-500 pr-6">جميع المسلسلات</h1>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-12">
            <div class="bg-gray-900 p-6 rounded-3xl shadow-2xl hover:scale-105 transition duration-300 border border-gray-800">
                <img src="https://m.media-amazon.com/images/M/MV5BMTQ5OTgzOTczM15BMl5BanBnXkFtZTcwMDM2OTY4MQ@@._V1_FMjpg_UX1000_.jpg" class="w-full h-96 object-cover rounded-2xl">
                <h3 class="mt-8 font-bold text-3xl">المنتاليست</h3>
                <a href="series-info.html?id=mentalist" class="mt-8 block w-full bg-blue-600 hover:bg-blue-700 text-center py-5 rounded-2xl font-bold text-xl transition">مشاهدة</a>
            </div>
        </div>
    </main>

   <script>
    // 1. عند فتح أي صفحة، طبق الإعدادات المحفوظة فوراً
    window.onload = () => {
        // استرجاع الإعدادات
        const savedTheme = localStorage.getItem('siteTheme') || 'bg-black';
        const savedSize = localStorage.getItem('fontSize') || '20';
        
        // تطبيق اللون على القائمة والمحتوى (الذي أعطيناهم IDs في الخطوة السابقة)
        const sidebar = document.getElementById('sidebar');
        const main = document.getElementById('mainContent');
        
        if (sidebar) sidebar.className = "w-80 border-l border-gray-800 p-10 min-h-screen " + savedTheme;
        if (main) main.className = "flex-1 p-16 " + savedTheme;
        
        // تطبيق الخط
        document.body.style.fontSize = savedSize + "px";
    };
</script>

</body>
</html>
