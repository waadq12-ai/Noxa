<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex">

    <aside class="w-72 bg-black border-l border-gray-800 p-8">
        <h2 class="text-3xl font-bold mb-12">Noxa</h2>
        <nav class="space-y-8">
            <a href="settings.html" class="block text-2xl font-bold text-white">الإعدادات العامة</a>
            <a href="history.html" class="block text-2xl text-gray-400 hover:text-white">سجل المشاهدة</a>
            
            <button onclick="logout()" class="block text-2xl text-red-500 font-bold hover:text-red-400">
                تسجيل الخروج
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-12">
        <h1 class="text-5xl font-bold mb-10">الإعدادات العامة</h1>
        <div class="bg-gray-900 p-10 rounded-3xl max-w-2xl">
            <p class="text-3xl">مرحباً بك يا <span id="userNameDisplay" class="text-blue-500 font-bold"></span></p>
            <p class="text-2xl text-gray-300 mt-4">تحكم في تفضيلات حسابك وتخصيص تجربتك في Noxa من هنا.</p>
        </div>
    </main>

    <script>
        const user = localStorage.getItem('currentUser');
        if (user) {
            document.getElementById('userNameDisplay').innerText = user;
        } else {
            window.location.href = "login.html";
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
