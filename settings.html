<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // التحقق من تسجيل الدخول (الحارس)
        if (!localStorage.getItem('currentUser')) {
            window.location.href = "login.html";
        }
    </script>
</head>
<body class="bg-black text-white min-h-screen flex text-2xl">

    <aside class="w-80 border-l border-gray-800 p-10 bg-black min-h-screen">
        <h2 class="text-5xl font-bold mb-16 text-white">Noxa</h2>
        
        <nav id="nav-menu" class="space-y-10">
            <a href="index.html" class="block text-3xl text-gray-400 hover:text-white transition">الرئيسية</a>
            <a href="settings.html" class="block text-3xl text-white font-bold underline transition">الإعدادات العامة</a>
            <a href="profile.html" class="block text-3xl text-gray-400 hover:text-white transition">الملف الشخصي</a>
        </nav>
    </aside>

   <main class="flex-1 p-16">
    <h1 class="text-7xl font-bold mb-16 text-white">الإعدادات العامة</h1>
    
    <div class="bg-gray-900 p-12 rounded-[3rem] max-w-3xl space-y-10">
        
        <div>
            <label class="text-2xl block mb-4 text-gray-300">لون الثيم الأساسي:</label>
            <select id="themeColor" onchange="applyTheme()" class="w-full p-6 bg-black rounded-2xl text-2xl border border-gray-700">
                <option value="bg-black">أسود داكن</option>
                <option value="bg-blue-950">أزرق ملكي</option>
                <option value="bg-gray-900">رمادي غامق</option>
            </select>
        </div>

        <div>
            <label class="text-2xl block mb-4 text-gray-300">حجم الخط:</label>
            <div class="flex gap-4">
                <button onclick="changeFontSize(-2)" class="bg-red-600 px-10 py-6 rounded-2xl text-2xl font-bold">تصغير (-)</button>
                <button onclick="changeFontSize(2)" class="bg-green-600 px-10 py-6 rounded-2xl text-2xl font-bold">تكبير (+)</button>
            </div>
        </div>
    </div>
</main>


    <script>
        // دمج كل الدوال في سكريبت واحد لتجنب التضارب
        const navMenu = document.getElementById('nav-menu');
        const isLogged = localStorage.getItem('currentUser');

        // إضافة الأزرار برمجياً للقائمة
        if (isLogged) {
            navMenu.innerHTML += `
                <button onclick="logout()" class="block text-3xl text-red-500 font-bold mt-20 hover:text-red-400 transition">تسجيل الخروج</button>
                <button onclick="deleteAccount()" class="block text-3xl text-red-500 font-bold mt-6 hover:text-red-400 transition">حذف الحساب</button>
            `;
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = "login.html";
        }

        function deleteAccount() {
            if (confirm("هل أنت متأكد؟ سيتم حذف جميع بياناتك نهائياً!")) {
                const user = localStorage.getItem('currentUser');
                localStorage.removeItem('user_' + user);
                localStorage.removeItem('myHistory_' + user);
                localStorage.removeItem('currentUser');
                window.location.href = "login.html";
            }
        }
    </script>
    <script>
    // تطبيق الثيم
    function applyTheme() {
        const color = document.getElementById('themeColor').value;
        localStorage.setItem('siteTheme', color);
        document.body.className = color + " text-white min-h-screen flex";
    }

    // تغيير الخط
    function changeFontSize(amount) {
        let currentSize = parseInt(localStorage.getItem('fontSize')) || 20;
        let newSize = currentSize + amount;
        localStorage.setItem('fontSize', newSize);
        document.body.style.fontSize = newSize + "px";
    }

    // استرجاع الإعدادات عند تحميل أي صفحة
    window.onload = () => {
        const savedTheme = localStorage.getItem('siteTheme');
        const savedSize = localStorage.getItem('fontSize');
        
        if (savedTheme) document.body.className = savedTheme + " text-white min-h-screen flex";
        if (savedSize) document.body.style.fontSize = savedSize + "px";
    };
</script>

</body>
</html>
