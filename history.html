<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سجل التاريخ</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        nav { background: #1c1c1c; padding: 15px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        nav a { color: #fff; text-decoration: none; margin: 0 15px; font-weight: bold; }
        h1 { font-size: 32px; margin-bottom: 20px; }
        ul { list-style: none; padding: 0; }
        li { background: #1c1c1c; margin: 10px 0; padding: 15px; border-radius: 10px; }
        li a { color: #fff; text-decoration: none; display: block; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">الرئيسية</a>
        <a href="settings.html">الإعدادات</a>
    </nav>

    <h1>سجل التاريخ</h1>
    <ul id="history-list">
        </ul>

    <script>
        function renderHistory() {
            const list = document.getElementById('history-list');
            const history = JSON.parse(localStorage.getItem('myHistory')) || [];
            
            if (history.length === 0) {
                list.innerHTML = "<li>لا توجد سجلات حالياً</li>";
            } else {
                list.innerHTML = history.map(item => `
                    <li>
                        <a href="watch.html?episode=${encodeURIComponent(item)}">
                            شاهدت: ${item} (اضغط للإكمال)
                        </a>
                    </li>
                `).join('');
            }
        }
        
        // تشغيل الدالة عند تحميل الصفحة
        renderHistory();
    </script>
</body>
</html>
