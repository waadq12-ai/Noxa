<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
   <script src="https://cdn.tailwindcss.com"></script>
    <meta charset="UTF-8">
    <title>سجل المشاهدة</title>
   <style>
    body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 40px; }
    
    h1 { font-size: 60px; font-weight: 800; margin-bottom: 50px; }
    
    .list-item { 
        background: #1c1c1c; 
        margin: 30px 0; 
        padding: 40px; /* مساحة داخلية كبيرة */
        border-radius: 30px; /* حواف دائرية أكبر */
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
    }
    
    .show-title { 
        font-size: 32px; /* خط العنوان ضخم */
        font-weight: bold; 
        display: block; 
    }
    
    .sub-text { 
        font-size: 22px; /* خط فرعي واضح */
        color: #aaa; 
        margin-top: 15px; 
    }
    
    .btn-del { 
        background: #444; 
        color: #fff; 
        border: none; 
        padding: 20px 35px; /* زر حذف كبير */
        border-radius: 18px; 
        cursor: pointer; 
        font-size: 20px; 
        font-weight: bold; 
    }
</style>

</head>
<body>

    <nav class="space-y-6">
    <a href="settings.html" class="block text-2xl font-bold text-gray-400 hover:text-white">الإعدادات العامة</a>
    
    <a href="profile.html" class="block text-2xl font-bold text-gray-400 hover:text-white">الملف الشخصي</a>
    
    <a href="history.html" class="block text-2xl font-bold text-gray-400 hover:text-white">سجل المشاهدة</a>
    
    <button onclick="logout()" class="block text-2xl text-red-500 font-bold mt-10">
        تسجيل الخروج
    </button>
</nav>


    <h1>سجل التاريخ</h1>
    <ul id="history-list"></ul>

   <script>
    // 1. دالة الحذف (معدلة لتناسب الحسابات)
    function deleteFromHistory(index) {
        const user = localStorage.getItem('currentUser');
        if (!user) return;
        
        let storageKey = 'myHistory_' + user;
        let history = JSON.parse(localStorage.getItem(storageKey)) || [];
        
        history.splice(index, 1);
        localStorage.setItem(storageKey, JSON.stringify(history));
        renderHistory(); // إعادة العرض بعد الحذف
    }

    // 2. دالة العرض (هنا تضع الكود الذي سألت عنه)
    function renderHistory() {
        const user = localStorage.getItem('currentUser');
        const list = document.getElementById('history-list');
        
        if (!user) {
            list.innerHTML = "<li style='text-align:center; color:white;'>يرجى تسجيل الدخول أولاً لمشاهدة سجلاتك</li>";
            return;
        }

        let storageKey = 'myHistory_' + user;
        let history = JSON.parse(localStorage.getItem(storageKey)) || [];
        
        if (history.length === 0) {
            list.innerHTML = "<li style='text-align:center;'>لم تشاهد أي حلقة بعد</li>";
        } else {
            list.innerHTML = history.map((item, index) => `
                <li style="display: flex; justify-content: space-between; align-items: center; background: #1c1c1c; margin: 20px 0; padding: 25px; border-radius: 20px;">
                    <a href="watch.html?episode=${encodeURIComponent(item)}" style="text-decoration:none; color:white; font-size: 22px; font-weight:bold;">
                        ${item}
                        <span style="display:block; color:#aaa; font-size:16px; margin-top:5px;">اضغط للإكمال</span>
                    </a>
                    <button onclick="deleteFromHistory(${index})" style="background: #444; color: #fff; border: none; padding: 15px 25px; font-size: 16px; font-weight: bold; border-radius: 12px; cursor: pointer;">
                        حذف
                    </button>
                </li>
            `).join('');
        }
    }

    // تشغيل الدالة عند تحميل الصفحة
    renderHistory();
</script>


</body>
</html>
