<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سجل المشاهدة</title>
    <style>
        /* تغيير الخلفية للأسود */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #000; 
            color: #fff;
            margin: 0; 
        }
        
        /* شريط التنقل */
        nav { background: #1c1c1c; padding: 15px; text-align: center; border-bottom: 1px solid #333; }
        nav a { color: #fff; text-decoration: none; margin: 0 15px; font-weight: bold; }
        
        .container { margin: 20px; }
        
        /* عنوان كبير وأسود (تم تعديله ليناسب الخلفية السوداء بلون أبيض) */
        h1 { 
            font-size: 42px; 
            color: #fff; 
            margin: 30px 0; 
            font-weight: 800; 
        }
        
        ul { list-style: none; padding: 0; }
        
        /* شكل السجلات */
        li { 
            background: #1c1c1c; 
            margin: 10px 0; 
            padding: 20px; 
            border-radius: 12px; 
            font-size: 18px;
            color: #ccc;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">الرئيسية</a>
        <a href="settings.html">الإعدادات</a>
    </nav>

    <div class="container">
        <h1>سجل التاريخ</h1>
        <ul id="history-list">
            </ul>
    </div>

    <script>
        // دالة لعرض السجلات
        function renderHistory() {
            const list = document.getElementById('history-list');
            const history = JSON.parse(localStorage.getItem('myHistory')) || [];
            
            if (history.length === 0) {
                list.innerHTML = "<li>لا توجد سجلات حالياً</li>";
            } else {
                list.innerHTML = history.map(item => `<li>شاهدت: ${item}</li>`).join('');
            }
        }

        // عرض السجل عند تحميل الصفحة
        renderHistory();
    </script>
</body>
</html>
